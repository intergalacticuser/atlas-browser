<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Downloads - Angle Browser</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { padding: 40px; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #a49d95; font-size: 14px; margin-bottom: 24px; }
    .clear-btn { background: none; border: 1px solid rgba(255,255,255,0.08); color: #a49d95; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .clear-btn:hover { border-color: #f07d99; color: #f07d99; }
    .download-list { margin-top: 16px; }
    .download-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; margin-bottom: 8px; background: #242228; }
    .download-item:hover { border-color: #8f7cff33; }
    .dl-icon { font-size: 24px; }
    .dl-info { flex: 1; }
    .dl-name { font-size: 14px; font-weight: 500; }
    .dl-meta { font-size: 11px; color: #a49d95; margin-top: 2px; font-family: 'SF Mono', monospace; }
    .dl-status { font-size: 11px; font-family: 'SF Mono', monospace; }
    .dl-status.completed { color: #32d69b; }
    .dl-status.progressing { color: #8f7cff; }
    .dl-status.cancelled { color: #f07d99; }
    .dl-actions button { background: none; border: none; color: #a49d95; cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 4px; }
    .dl-actions button:hover { background: #2a282f; color: #f5efe8; }
    .empty { text-align: center; padding: 60px; color: #a49d95; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .progress-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 6px; }
    .progress-fill { height: 100%; background: #8f7cff; border-radius: 2px; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>&#x2b07; Downloads</h1>
  <div class="subtitle">
    <button class="clear-btn" id="clear-btn">Clear History</button>
  </div>
  <div id="download-list" class="download-list">
    <div class="empty">
      <div class="empty-icon">&#x1f4e5;</div>
      <p>No downloads yet</p>
    </div>
  </div>
  <script>
    const api = window.browserAPI;
    const list = document.getElementById('download-list');
    const clearBtn = document.getElementById('clear-btn');

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function formatBytes(b) {
      if (b === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(b) / Math.log(k));
      return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    async function load() {
      if (!api) return;
      const downloads = await api.getDownloads();
      if (!downloads || downloads.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">&#x1f4e5;</div><p>No downloads yet</p></div>';
        return;
      }
      list.innerHTML = downloads.map(d => {
        const pct = d.totalBytes > 0 ? Math.round(d.receivedBytes / d.totalBytes * 100) : 0;
        return '<div class="download-item">' +
          '<span class="dl-icon">' + (d.state === 'completed' ? '&#x2705;' : d.state === 'progressing' ? '&#x23f3;' : '&#x274c;') + '</span>' +
          '<div class="dl-info">' +
            '<div class="dl-name">' + d.filename + '</div>' +
            '<div class="dl-meta">' + formatBytes(d.receivedBytes) + ' / ' + formatBytes(d.totalBytes) + '</div>' +
            (d.state === 'progressing' ? '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' : '') +
          '</div>' +
          '<span class="dl-status ' + d.state + '">' + d.state + '</span>' +
          '<div class="dl-actions">' +
            (d.state === 'completed' ? '<button onclick="api.showDownload(\'' + d.savePath.replace(/'/g, "\\'") + '\')">Show</button>' : '') +
          '</div>' +
        '</div>';
      }).join('');
    }

    clearBtn.addEventListener('click', async () => {
      if (!api) return;
      await api.clearDownloads();
      load();
    });

    load();
    if (api) {
      api.onDownloadStarted(() => load());
      api.onDownloadProgress(() => load());
      api.onDownloadDone(() => load());
    }
  </script>
</body>
</html>
